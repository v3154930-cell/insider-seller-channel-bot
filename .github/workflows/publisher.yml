name: Publisher - Post to MAX

on:
  schedule:
    - cron: '15,45 * * * *'
  workflow_dispatch:
    inputs:
      force_audio_digest:
        description: 'Force audio digest generation'
        required: false
        default: 'false'
        type: string

permissions:
  contents: read
  models: read

jobs:
  publisher:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger info
        run: |
          echo "Publisher workflow triggered"
          echo "Trigger type: ${{ github.event_name }}"
          echo "Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publisher started
        run: echo "Publisher started at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: Run publisher
        env:
          MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_LLM: ${{ vars.USE_LLM }}
          SELLER_FILTER_MODE: ${{ vars.SELLER_FILTER_MODE }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          SALUTE_AUTH_KEY: ${{ secrets.SALUTE_AUTH_KEY }}
          ENABLE_AUDIO_DIGEST: ${{ vars.ENABLE_AUDIO_DIGEST }}
          ENABLE_MORNING_DIGEST: ${{ vars.ENABLE_MORNING_DIGEST }}
          ENABLE_EVENING_DIGEST: ${{ vars.ENABLE_EVENING_DIGEST }}
          SALUTESPEECH_VOICE: ${{ vars.SALUTESPEECH_VOICE }}
          AUDIO_DIGEST_HOUR_MSK: ${{ vars.AUDIO_DIGEST_HOUR_MSK }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DROP_TTL_HOURS: ${{ vars.DROP_TTL_HOURS }}
          DIGEST_TTL_DAYS: ${{ vars.DIGEST_TTL_DAYS }}
          SENT_TTL_DAYS: ${{ vars.SENT_TTL_DAYS }}
          PENDING_TTL_DAYS: ${{ vars.PENDING_TTL_DAYS }}
        run: |
          echo "FORCE_AUDIO_DIGEST=${{ github.inputs.force_audio_digest }}" >> $GITHUB_ENV
          python publisher.py

      - name: Publisher finished
        run: echo "Publisher finished at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: Upload posted links
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: posted-links
          path: posted_links.txt
          retention-days: 7