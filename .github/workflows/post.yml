name: Post News to MAX Channel

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: 'Hours to fetch news from'
        required: false
        default: '2'
        type: string
      force_audio_digest:
        description: 'Force audio digest generation'
        required: false
        default: 'false'
        type: string

permissions:
  contents: read
  models: read

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_LLM: ${{ secrets.USE_LLM }}
          SALUTE_AUTH_KEY: ${{ secrets.SALUTE_AUTH_KEY }}
          ENABLE_AUDIO_DIGEST: ${{ vars.ENABLE_AUDIO_DIGEST }}
          ENABLE_MORNING_DIGEST: ${{ vars.ENABLE_MORNING_DIGEST }}
          ENABLE_EVENING_DIGEST: ${{ vars.ENABLE_EVENING_DIGEST }}
          SALUTESPEECH_VOICE: ${{ vars.SALUTESPEECH_VOICE }}
          AUDIO_DIGEST_HOUR_MSK: ${{ vars.AUDIO_DIGEST_HOUR_MSK }}
          FORCE_AUDIO_DIGEST: ${{ github.inputs.force_audio_digest }}
        run: python channel_bot.py

      - name: Upload posted links
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: posted-links
          path: posted_links.txt
          retention-days: 7
