name: Collector - Fetch News

on:
  schedule:
    - cron: '5,35 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collector:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          USE_LLM: ${{ vars.USE_LLM }}
          SELLER_FILTER_MODE: ${{ vars.SELLER_FILTER_MODE }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DROP_TTL_HOURS: ${{ vars.DROP_TTL_HOURS }}
          DIGEST_TTL_DAYS: ${{ vars.DIGEST_TTL_DAYS }}
          SENT_TTL_DAYS: ${{ vars.SENT_TTL_DAYS }}
          PENDING_TTL_DAYS: ${{ vars.PENDING_TTL_DAYS }}
        run: python collector.py